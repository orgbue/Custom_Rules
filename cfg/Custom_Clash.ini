;Custom_OpenClash_Rules
;全分组防 DNS 泄漏订阅转换模板
;作者：https://github.com/Aethersailor
;项目地址：https://github.com/Aethersailor/Custom_OpenClash_Rules
;基于 ACL4SSR 模板魔改而来，感谢原作者！
;<必须>搭配本项目配套教程，实现最佳化的 OpenClash 使用效果！
;教程：https://github.com/Aethersailor/Custom_OpenClash_Rules/wiki/OpenClash-%E8%AE%BE%E7%BD%AE%E6%96%B9%E6%A1%88
;有问题可提 issue，或者加入本项目 Telegram 群组进行讨论
;Telegram 群组：https://t.me/custom_openclash_rules_group
;Telegram 通知频道：https://t.me/custom_openclash_rules
;建议加入通知频道或群组，谨防失联

[custom]
;设置规则标志位
;以下规则，按照从上往下的顺序遍历，优先命中上位规则，规则重复无影响
;修改顺序会影响分流效果
ruleset=全球直连,[]DOMAIN-SUFFIX,cloudflare.com

;全球拦截(广告拦截)
ruleset=全球拦截,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Advertising/Advertising_Classical.yaml,28800
ruleset=全球拦截,clash-domain:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Advertising/Advertising_Domain.txt,28800
;本地地址和域名直连
ruleset=全球直连,[]GEOSITE,private
ruleset=全球直连,[]GEOIP,private,no-resolve
ruleset=全球直连,clash-domain:https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/private.txt,28800
ruleset=全球直连,clash-domain:https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/lancidr.txt,28800
;本项目收录的直连规则
ruleset=全球直连,clash-domain:https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt,28800
ruleset=全球直连,clash-classic:https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/cncidr.txt,28800
;本项目收录的代理规则
ruleset=手动选择,clash-domain:https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/proxy.txt,28800
;谷歌在国内可用的域名直连
ruleset=全球直连,[]GEOSITE,google-cn
;国内游戏域名直连
ruleset=全球直连,[]GEOSITE,category-games@cn
;需要直连的常见软件列表
ruleset=全球直连,clash-classic:https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/applications.txt,28800
;各大游戏平台下载域名直连
ruleset=全球直连,[]GEOSITE,category-game-platforms-download
;BT Tracker 相关域名直连
ruleset=全球直连,[]GEOSITE,category-public-tracker
;即时通讯包括了 Telegram/WhatsApp/Line 等海外主流即时通讯软件域名
ruleset=即时通讯,[]GEOSITE,category-communication
;社交媒体包括了 Twitter(X)/Facebook/Instagram 等海外主流社交媒体
ruleset=社交媒体,[]GEOSITE,category-social-media-!cn
ruleset=社交媒体,clash-classic:https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/telegramcidr.txt,28800
ruleset=AI服务,[]GEOSITE,category-ai-!cn
ruleset=GitHub,[]GEOSITE,github
;测速工具包括 SpeedTest 等主流测速工具域名
ruleset=测速工具,[]GEOSITE,category-speedtest
ruleset=YouTube,[]GEOSITE,youtube
ruleset=苹果服务,[]GEOSITE,apple
ruleset=微软服务,[]GEOSITE,microsoft
ruleset=谷歌服务,[]GEOSITE,google
ruleset=国外媒体,[]GEOSITE,category-entertainment
ruleset=手动选择,clash-classic:https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/gfw.txt,28800
ruleset=手动选择,[]GEOSITE,gfw
ruleset=谷歌服务,[]GEOIP,google,no-resolve
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geosite:cn 作为国内域名兜底
ruleset=全球直连,[]GEOSITE,cn
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geoip:cn 作为国内 IP 兜底
ruleset=全球直连,[]GEOIP,cn,no-resolve
;以上兜底规则会根据实际情况随时取消
;PT/BT 优化开启会使 80/443 以外端口的流量直连
ruleset=非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800
;国内冷门域名会命中漏网之鱼，如影响使用，请设置漏网之鱼直连
;漏网之鱼直连时，无法通过 DNS 泄露测试，但是并不存在泄露
ruleset=漏网之鱼,[]FINAL
;设置规则标志位结束

;设置节点分组标志位
;节点地区分组参考本项目推荐机场而设立
custom_proxy_group=手动选择`select`[]自动选择`[]电信节点`[]移动节点`[]联通节点`[]优选节点`.*
custom_proxy_group=自动选择`url-test`.*`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=即时通讯`select`[]自动选择`[]电信节点`[]移动节点`[]联通节点`[]优选节点`[]手动选择
custom_proxy_group=社交媒体`select`[]电信节点`[]移动节点`[]联通节点`[]优选节点`[]手动选择`[]自动选择
custom_proxy_group=GitHub`select`[]电信节点`[]移动节点`[]联通节点`[]优选节点`[]手动选择`[]自动选择`[]全球直连
custom_proxy_group=AI服务`select`[]电信节点`[]移动节点`[]联通节点`[]优选节点`[]手动选择`[]自动选择
custom_proxy_group=国外媒体`select`[]电信节点`[]移动节点`[]联通节点`[]手动选择`[]自动选择`[]全球直连
custom_proxy_group=谷歌服务`select`[]电信节点`[]移动节点`[]联通节点`[]优选节点`[]手动选择`[]自动选择`[]全球直连
custom_proxy_group=苹果服务`select`[]全球直连`[]电信节点`[]移动节点`[]联通节点`[]优选节点`[]手动选择`[]自动选择
custom_proxy_group=微软服务`select`[]全球直连`[]电信节点`[]移动节点`[]联通节点`[]优选节点`[]手动选择`[]自动选择
custom_proxy_group=YouTube`select`[]全球直连`[]电信节点`[]移动节点`[]联通节点`[]优选节点`[]手动选择`[]自动选择
custom_proxy_group=测速工具`select`[]全球直连`[]电信节点`[]移动节点`[]联通节点`[]优选节点`[]手动选择`[]自动选择`.*
custom_proxy_group=漏网之鱼`select`[]电信节点`[]移动节点`[]联通节点`[]优选节点`[]手动选择`[]自动选择`[]全球直连`[]全球拦截
custom_proxy_group=非标端口`select`[]遵循规则`[]全球直连`[]全球拦截
custom_proxy_group=电信节点`url-test`(电信)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=移动节点`url-test`(移动)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=联通节点`url-test`(联通)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=优选节点`url-test`^(?!.*(电信|移动|联通)).*`https://cp.cloudflare.com/generate_204`300,,30
custom_proxy_group=遵循规则`select`[]漏网之鱼`[]全球拦截
custom_proxy_group=全球直连`select`[]DIRECT
custom_proxy_group=全球拦截`select`[]REJECT`[]DIRECT

;设置分组标志位

;下方参数请勿修改
enable_rule_generator=true
overwrite_original_rules=true
